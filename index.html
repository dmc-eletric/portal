<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社内管理プラットフォーム</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: #f6f7fb;
      color: #1f2937;
      min-height: 100vh;
      padding: 30px 40px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 30px;
    }

    .title h1 {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #111827;
    }

    .title p {
      color: #6b7280;
      font-size: 16px;
    }

    .login-status {
      color: #9ca3af;
      font-size: 14px;
      margin-top: 10px;
    }

    .app-grid {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .app-card {
      width: 220px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
      position: relative;
    }

    .app-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
    }

    .icon-box {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      margin: 0 auto 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
    }

    .app-name {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #111827;
    }

    .app-desc {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 14px;
      line-height: 1.5;
      min-height: 40px;
    }

    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .delete-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      border: none;
      background: #fee2e2;
      color: #dc2626;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: #9ca3af;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .top-bar {
        flex-direction: column;
        gap: 10px;
      }

      .app-grid {
        justify-content: center;
      }

      .app-card {
        width: 100%;
        max-width: 280px;
      }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="title">
      <h1>社内管理プラットフォーム</h1>
      <p>アプリを選択してください</p>
    </div>
    <div class="login-status">未ログイン</div>
  </div>

  <div class="app-grid" id="appGrid"></div>

  <div class="footer">© 社内システム</div>

  <script>
    const defaultApps = [
      {
        name: "JIG管理システム",
        description: "貸出・返却・モニター",
        url: "https://nguyenluc93.github.io/jig-lastend/",
        icon: "⌂",
        bg: "#ede9fe",
        color: "#7c3aed",
        status: "利用可",
        statusBg: "#ede9fe",
        statusColor: "#7c3aed"
      },
      {
        name: "在庫管理",
        description: "在庫・入出庫・アラート",
        url: "#",
        icon: "▣",
        bg: "#d1fae5",
        color: "#047857",
        status: "準備中",
        statusBg: "#d1fae5",
        statusColor: "#047857"
      }
    ];

    let apps = JSON.parse(localStorage.getItem("portalApps")) || defaultApps;

    const appGrid = document.getElementById("appGrid");

    function saveApps() {
      localStorage.setItem("portalApps", JSON.stringify(apps));
    }

    function renderApps() {
      appGrid.innerHTML = "";

      apps.forEach((app, index) => {
        const card = document.createElement("div");
        card.className = "app-card";

        card.innerHTML = `
          ${index >= defaultApps.length ? `<button class="delete-btn" onclick="deleteApp(${index})">×</button>` : ""}
          <div class="icon-box" style="background:${app.bg}; color:${app.color}">
            ${app.icon}
          </div>
          <div class="app-name">${app.name}</div>
          <div class="app-desc">${app.description}</div>
          <span class="status" style="background:${app.statusBg}; color:${app.statusColor}">
            ${app.status}
          </span>
        `;

        card.onclick = (e) => {
          if (e.target.classList.contains("delete-btn")) return;
          if (app.url && app.url !== "#") {
            window.location.href = app.url;
          }
        };

        appGrid.appendChild(card);
      });

      const addCard = document.createElement("div");
      addCard.className = "app-card";

      addCard.innerHTML = `
        <div class="icon-box" style="background:#f3f4f6; color:#6b7280">+</div>
        <div class="app-name">新しいアプリ</div>
        <div class="app-desc">新しいシステムを追加</div>
        <span class="status" style="background:#f3f4f6; color:#6b7280">追加</span>
      `;

      addCard.onclick = () => {
        const name = prompt("アプリ名を入力してください");
        if (!name) return;

        const url = prompt("アプリURLを入力してください");
        if (!url) return;

        apps.push({
          name: name,
          description: "新しいシステム",
          url: url,
          icon: "◉",
          bg: "#dbeafe",
          color: "#2563eb",
          status: "利用可",
          statusBg: "#dbeafe",
          statusColor: "#2563eb"
        });

        saveApps();
        renderApps();
      };

      appGrid.appendChild(addCard);
    }

    function deleteApp(index) {
      if (confirm("このアプリを削除しますか？")) {
        apps.splice(index, 1);
        saveApps();
        renderApps();
      }
    }

    renderApps();
  </script>

</body>
</html>
