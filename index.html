<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社内管理プラットフォーム</title>
  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", sans-serif;
  }

  body {
    background: #f6f7fb;
    color: #1f2937;
    min-height: 100vh;
    padding: 20px; /* Giảm padding tổng thể */
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .title h1 {
    font-size: 24px; /* Thu nhỏ tiêu đề */
    font-weight: bold;
    color: #111827;
  }

  .title p {
    color: #6b7280;
    font-size: 14px;
  }

  .login-status {
    color: #9ca3af;
    font-size: 12px;
  }

  .app-grid {
    display: grid; /* Chuyển sang Grid để dễ kiểm soát */
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
    gap: 15px;
  }

  .app-card {
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 16px;
    padding: 15px; /* Thu nhỏ padding trong card */
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 2px 5px rgba(0,0,0,0.03);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .app-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 12px rgba(0,0,0,0.08);
  }

  .icon-box {
    width: 45px; /* Thu nhỏ icon từ 58px xuống 45px */
    height: 45px;
    border-radius: 12px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .app-name {
    font-size: 16px; /* Thu nhỏ font name */
    font-weight: 700;
    margin-bottom: 4px;
    color: #111827;
  }

  .app-desc {
    font-size: 12px; /* Thu nhỏ mô tả */
    color: #6b7280;
    margin-bottom: 10px;
    line-height: 1.3;
    min-height: 32px;
  }

  .status {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
  }

  .delete-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    border: none;
    background: #fee2e2;
    color: #dc2626;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 12px;
  }

  /* TỐI ƯU RIÊNG CHO ĐIỆN THOẠI */
  @media (max-width: 480px) {
    .app-grid {
      grid-template-columns: 1fr; /* Xếp thành 1 hàng dọc duy nhất */
    }

    .app-card {
      flex-direction: row; /* Layout nằm ngang để tiết kiệm chiều dọc */
      text-align: left;
      padding: 12px;
      justify-content: flex-start;
    }

    .icon-box {
      margin: 0 15px 0 0; /* Đẩy icon sang trái */
      width: 40px;
      height: 40px;
      flex-shrink: 0;
    }

    .app-desc {
      min-height: auto;
      margin-bottom: 5px;
    }

    .status {
      position: absolute;
      right: 12px;
      bottom: 12px;
    }
    
    .app-name {
      font-size: 15px;
    }
  }
</style>
</head>
<body>

  <div class="top-bar">
    <div class="title">
      <h1>DMC社内管理プラットフォーム</h1>
      <p>アプリを選択してください</p>
    </div>
    <div class="login-status">未ログイン</div>
  </div>

  <div class="app-grid" id="appGrid"></div>

  <div class="footer">© 社内システム</div>

  <script>
    const defaultApps = [
      {
        name: "JIG管理システム",
        description: "貸出・返却・モニター",
        url: "https://nguyenluc93.github.io/jig-lastend/",
        icon: "⌂",
        bg: "#ede9fe",
        color: "#7c3aed",
        status: "利用可",
        statusBg: "#ede9fe",
        statusColor: "#7c3aed"
      },
      {
        name: "在庫管理",
        description: "在庫・入出庫・アラート",
        url: "https://dmc-eletric.github.io/buzaikanri/",
        icon: "▣",
        bg: "#d1fae5",
        color: "#047857",
        status: "利用可能",
        statusBg: "#d1fae5",
        statusColor: "#047857"
      }
    ];

    let apps = JSON.parse(localStorage.getItem("portalApps")) || defaultApps;

    const appGrid = document.getElementById("appGrid");

    function saveApps() {
      localStorage.setItem("portalApps", JSON.stringify(apps));
    }

    function renderApps() {
      appGrid.innerHTML = "";

      apps.forEach((app, index) => {
        const card = document.createElement("div");
        card.className = "app-card";

        card.innerHTML = `
          ${index >= defaultApps.length ? `<button class="delete-btn" onclick="deleteApp(${index})">×</button>` : ""}
          <div class="icon-box" style="background:${app.bg}; color:${app.color}">
            ${app.icon}
          </div>
          <div class="app-name">${app.name}</div>
          <div class="app-desc">${app.description}</div>
          <span class="status" style="background:${app.statusBg}; color:${app.statusColor}">
            ${app.status}
          </span>
        `;

        card.onclick = (e) => {
          if (e.target.classList.contains("delete-btn")) return;
          if (app.url && app.url !== "#") {
            window.location.href = app.url;
          }
        };

        appGrid.appendChild(card);
      });

      const addCard = document.createElement("div");
      addCard.className = "app-card";

      addCard.innerHTML = `
        <div class="icon-box" style="background:#f3f4f6; color:#6b7280">+</div>
        <div class="app-name">新しいアプリ</div>
        <div class="app-desc">新しいシステムを追加</div>
        <span class="status" style="background:#f3f4f6; color:#6b7280">追加</span>
      `;

      addCard.onclick = () => {
        const name = prompt("アプリ名を入力してください");
        if (!name) return;

        const url = prompt("アプリURLを入力してください");
        if (!url) return;

        apps.push({
          name: name,
          description: "新しいシステム",
          url: url,
          icon: "◉",
          bg: "#dbeafe",
          color: "#2563eb",
          status: "利用可",
          statusBg: "#dbeafe",
          statusColor: "#2563eb"
        });

        saveApps();
        renderApps();
      };

      appGrid.appendChild(addCard);
    }

    function deleteApp(index) {
      if (confirm("このアプリを削除しますか？")) {
        apps.splice(index, 1);
        saveApps();
        renderApps();
      }
    }

    renderApps();
  </script>

</body>
</html>
